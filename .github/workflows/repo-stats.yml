name: repo-stats

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Run GitHub Repo Stats
        uses: jgehrcke/github-repo-stats@v1.4.2
        with:
          repository: AiratTop/n8n-self-hosted
          ghtoken: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
